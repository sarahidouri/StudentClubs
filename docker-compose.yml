version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6-alpine
    container_name: studentclubs-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mongodb123
      MONGO_INITDB_DB: studentclubs
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - studentclubs-network
      - studentclubs-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Server
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: studentclubs-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:mongodb123@mongodb:27017/studentclubs
      MONGODB_TEST_URI: mongodb://admin:mongodb123@mongodb:27017/studentclubs_test
      CLIENT_URL: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_change_this_in_production}
      JWT_EXPIRE: 7d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your_jwt_refresh_secret_key}
      JWT_REFRESH_EXPIRE: 30d
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: http://localhost:5000/api/auth/google/callback
      CLOUDINARY_NAME: ${CLOUDINARY_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      EMAIL_SERVICE: ${EMAIL_SERVICE:-gmail}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SESSION_SECRET: ${SESSION_SECRET:-your_session_secret_key_change_this}
    ports:
      - '5000:5000'
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - campusconnect-network
    volumes:
      - ./server/src:/app/server/src
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:5000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Frontend Application
  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: studentclubs-frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_SOCKET_URL: http://localhost:5000
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - studentclubs-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  studentclubs-network:
    driver: bridge
